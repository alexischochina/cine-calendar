<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <rect width="1200" height="630" fill="#27262A"/>
  <!-- Pink accent bar -->
  <rect x="0" y="0" width="8" height="630" fill="#ec008b"/>
  <!-- Clapperboard body -->
  <rect x="460" y="240" width="280" height="165" rx="12" fill="#ec008b"/>
  <!-- Holes -->
  <rect x="485" y="268" width="22" height="22" rx="4" fill="#27262A" opacity=".45"/>
  <rect x="485" y="308" width="22" height="22" rx="4" fill="#27262A" opacity=".45"/>
  <rect x="693" y="268" width="22" height="22" rx="4" fill="#27262A" opacity=".45"/>
  <rect x="693" y="308" width="22" height="22" rx="4" fill="#27262A" opacity=".45"/>
  <!-- Top bar -->
  <rect x="460" y="168" width="280" height="72" rx="12" fill="#ffffff"/>
  <!-- Diagonal stripes -->
  <clipPath id="c">
    <rect x="460" y="168" width="280" height="72" rx="12"/>
  </clipPath>
  <g clip-path="url(#c)" fill="#27262A">
    <polygon points="460,168 530,168 460,240"/>
    <polygon points="532,168 602,168 532,240 462,240"/>
    <polygon points="604,168 674,168 604,240 534,240"/>
    <polygon points="676,168 746,168 676,240 606,240"/>
    <polygon points="748,168 740,168 740,240 678,240"/>
  </g>
  <!-- Title -->
  <text x="600" y="470" font-family="Georgia, serif" font-size="72" font-weight="bold" fill="#ffffff" text-anchor="middle" letter-spacing="2">Ciné<tspan fill="#ec008b">Cal</tspan></text>
  <!-- Subtitle -->
  <text x="600" y="530" font-family="Georgia, serif" font-size="26" fill="rgba(255,255,255,0.45)" text-anchor="middle" letter-spacing="1">Mon calendrier de films perso</text>
</svg>
