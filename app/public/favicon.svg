<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Clapperboard body -->
  <rect x="5" y="14" width="22" height="13" rx="2" fill="#ec008b"/>
  <!-- Small dots on body (film holes) -->
  <rect x="8" y="17" width="2.5" height="2.5" rx=".5" fill="#27262A" opacity=".5"/>
  <rect x="8" y="21.5" width="2.5" height="2.5" rx=".5" fill="#27262A" opacity=".5"/>
  <rect x="21.5" y="17" width="2.5" height="2.5" rx=".5" fill="#27262A" opacity=".5"/>
  <rect x="21.5" y="21.5" width="2.5" height="2.5" rx=".5" fill="#27262A" opacity=".5"/>
  <!-- Clapperboard top (white bar) -->
  <rect x="5" y="8" width="22" height="6" rx="2" fill="#ffffff"/>
  <!-- Diagonal stripes on top bar -->
  <clipPath id="topclip">
    <rect x="5" y="8" width="22" height="6" rx="2"/>
  </clipPath>
  <g clip-path="url(#topclip)">
    <polygon points="5,8 10,8 5,14" fill="#27262A"/>
    <polygon points="11,8 16,8 11,14 6,14" fill="#27262A"/>
    <polygon points="17,8 22,8 17,14 12,14" fill="#27262A"/>
    <polygon points="23,8 27,8 23,14 18,14" fill="#27262A"/>
  </g>
</svg>
